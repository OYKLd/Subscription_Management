<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Abonnements</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1> gestion des abonnements</h1>
            <p class="subtitle">Suivez vos dépenses mensuelles</p>
        </header>

        <main class="main">
            <!-- Dashboard Summary -->
            <section class="dashboard">
                <div class="summary-cards">
                    <div class="card total-monthly">
                        <div class="card-icon">mensuel</div>
                        <div class="card-content">
                            <h3>Total Mensuel</h3>
                            <p class="amount" id="totalMonthly">0,00&nbsp;FCFA</p>
                        </div>
                    </div>
                    <div class="card total-annual">
                        <div class="card-icon">annuel</div>
                        <div class="card-content">
                            <h3>Total Annuel</h3>
                            <p class="amount" id="totalAnnual">0,00&nbsp;FCFA</p>
                        </div>
                    </div>
                    <div class="card next-payment">
                        <div class="card-icon">calendrier</div>
                        <div class="card-content">
                            <h3>Prochain Paiement</h3>
                            <p class="date" id="nextPayment">Aucun</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Add Subscription Form -->
            <section class="add-subscription">
                <h2>Ajouter un Abonnement</h2>
                <form id="subscriptionForm" class="form">
                    <div class="form-group">
                        <label for="name">Nom de l'abonnement</label>
                        <input type="text" id="name" required placeholder="Netflix, Spotify...">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Prix (FCFA)</label>
                            <input type="number" id="price" step="0.01" min="0" required placeholder="0,00 FCFA">
                        </div>
                        <div class="form-group">
                            <label for="frequency">Fréquence</label>
                            <select id="frequency" required>
                                <option value="monthly">Mensuel</option>
                                <option value="annual">Annuel</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="paymentDate">Date de paiement</label>
                        <input type="date" id="paymentDate" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Ajouter l'abonnement</button>
                </form>
            </section>

            <!-- Subscriptions List -->
            <section class="subscriptions">
                <h2>Mes Abonnements</h2>
                <div id="subscriptionsList" class="subscriptions-grid">
                    <!-- Subscriptions will be added here dynamically -->
                </div>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">abonnements</div>
                    <p>Aucun abonnement ajouté</p>
                    <p>Ajoutez votre premier abonnement pour commencer</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
